<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Planilla Real vs Presupuesto</title>
    <link rel="stylesheet" href="src/css/styles.css" />
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js" defer></script>
    <script src="src/js/app.js" defer></script>
  </head>
  <body>
    <main class="container">
      <h1>Planilla - Hoja BD_Real</h1>
      <p class="hint">
        Vista funcional de la primera hoja con filtros tipo TC, orden por columnas y paginación.
        El archivo se carga automáticamente desde <strong>BD Real vs PPTO.xlsx</strong>.
      </p>

      <section id="status" class="status">Inicializando…</section>

      <section class="tc-filters">
        <h2>Filtros base (TC)</h2>
        <div class="tc-grid">
          <label>
            Mes
            <select id="tcMonth"></select>
          </label>
          <label>
            Tipo
            <select id="tcType"></select>
          </label>
          <label>
            Ubicación
            <select id="tcLocation"></select>
          </label>
        </div>
      </section>

      <section class="filters">
        <div class="section-header">
          <h2>Filtros adicionales</h2>
          <button id="clearFilters" type="button">Limpiar filtros</button>
        </div>
        <div class="filter-grid" id="filterGrid"></div>
        <label class="text-filter">
          Buscar texto libre
          <input id="textQuery" type="search" placeholder="Ej: CECO, cuenta, explicación…" />
        </label>
      </section>

      <section class="table-panel">
        <div class="table-head">
          <h2>BD_Real</h2>
          <p id="tableMeta" class="count"></p>
        </div>

        <div class="table-wrap"><table id="tableReal"></table></div>

        <div class="pager">
          <button id="prevPage" type="button">Anterior</button>
          <span id="pageInfo"></span>
          <button id="nextPage" type="button">Siguiente</button>
          <label>
            Filas por página
            <select id="pageSize">
              <option value="25">25</option>
              <option value="50" selected>50</option>
              <option value="100">100</option>
              <option value="200">200</option>
            </select>
          </label>
        </div>
      </section>
    </main>
  </body>
</html>
